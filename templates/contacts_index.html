<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1><center>Contact Book</center></h1>
<div class="container">
    <p><a href="{{ url_for('add_contact') }}">Add Contact</a> | 
       <a href="{{ url_for('search_contact') }}">Search Contact</a> | 
       <a href="{{ url_for('delete_contact') }}">Delete Contact</a></p>

    {% if contacts %}
    <table>
        <tr>
            <th>Name</th>
            <th>Phone</th>
        </tr>
        {% for c in contacts %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.phone }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No contacts yet.</p>
    {% endif %}
</div>
</body>
</html>
