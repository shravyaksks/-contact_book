<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Contact</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
        <h1><center>Delete Contact</center></h1>

<div class="container">
    <form method="POST">
        <label>Name:</label>
        <input type="text" name="name" required>
        <button type="submit">Delete</button>
    </form>

    {% if message %}
        <div class="result">
            <p>{{ message }}</p>
        </div>
    {% endif %}

    <p><a href="{{ url_for('home') }}">Back to Home</a></p>
</div>
</body>
</html>
